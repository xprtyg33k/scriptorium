<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillermo Salas — Resume</title>
  <link id="gfonts-link"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --heading-font: 'Cormorant Garamond', serif;
      --body-font: 'DM Sans', sans-serif;
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-muted: #888;
      --rule: #c8b99a;
      --rule-subtle: #e8e0d0;
      --accent: #8b6f47;
      --accent-dark: #7a5f3a;
      --accent-light: #f5f0e8;
      --bg: #fdfaf5;
      --page: #ffffff;
      --col-left: clamp(96px, 16%, 132px);
      --gap: 16px;
    }

    [data-theme="executive"] {
      --heading-font: 'Inter', sans-serif;
      --body-font: 'Inter', sans-serif;
      --ink: #0f1923;
      --ink-light: #374151;
      --ink-muted: #6b7280;
      --rule: #94a3b8;
      --rule-subtle: #d1d9e0;
      --accent: #1e3a5f;
      --accent-dark: #152b47;
      --accent-light: #e8eef5;
      --bg: #f1f5f9;
      --page: #ffffff;
    }

    [data-theme="carbon"] {
      --heading-font: 'DM Serif Display', serif;
      --body-font: 'DM Sans', sans-serif;
      --ink: #111827;
      --ink-light: #374151;
      --ink-muted: #6b7280;
      --rule: #4b5563;
      --rule-subtle: #d1d5db;
      --accent: #0d7490;
      --accent-dark: #0a5a6e;
      --accent-light: #e0f2f7;
      --bg: #f9fafb;
      --page: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: var(--body-font);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── toolbar ── */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
      gap: 12px;
    }

    #toolbar span {
      color: #aaa;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }

    #toolbar .toolbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-ghost {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
    }

    .btn-ghost:hover {
      border-color: #888;
      color: #fff;
    }

    .theme-select {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #444;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    .theme-select:hover {
      border-color: #888;
    }

    /* ── page wrapper ── */
    #page-wrap {
      padding-top: 72px;
      padding-bottom: 48px;
      display: flex;
      justify-content: center;
    }

    /* ── resume sheet ── */
    #resume {
      background: var(--page);
      width: 794px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.10);
      padding: 44px 48px 52px;
    }

    /* ── header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 26px;
    }

    #header-left h1 {
      font-family: var(--heading-font);
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    #header-left .title-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
    }

    #header-right {
      text-align: right;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.9;
    }

    #header-right a {
      color: var(--accent);
      text-decoration: none;
    }

    #header-right a:hover {
      text-decoration: underline;
    }

    /* ── section layout ── */
    .section {
      display: flex;
      margin-bottom: 20px;
    }

    .section-label {
      width: var(--col-left);
      flex-shrink: 0;
      padding-top: 2px;
      text-align: right;
    }

    .section-label h2 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      padding-top: 4px;
    }

    .section-divider {
      width: 32px;
      height: 1px;
      background: var(--rule);
      margin: 8px 0 0 auto;
    }

    .section-body {
      flex-grow: 1;
      border-left: 1px solid var(--rule);
      padding-left: var(--gap);
      margin-left: var(--gap);
    }

    /* ── summary ── */
    .summary-text {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.55;
      font-style: italic;
    }

    /* ── experience ── */
    .job {
      margin-bottom: 14px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .job:last-child {
      margin-bottom: 0;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }

    .job-company {
      font-family: var(--heading-font);
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .job-period {
      font-size: 10.5px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .job-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .job-bullets {
      list-style: none;
      padding: 0;
    }

    .job-bullets li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 2px;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.5;
    }

    .job-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--rule);
      font-size: 11px;
      top: 1px;
    }

    .job-bullets li.bullet-heading {
      padding-left: 0;
      margin-top: 8px;
      margin-bottom: 3px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.4;
    }

    .job-bullets li.bullet-heading::before {
      content: '';
    }

    .practitioner-intro {
      font-size: 11.5px;
      color: var(--ink-light);
      font-style: italic;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .job+.job {
      padding-top: 12px;
      border-top: 1px dashed var(--rule-subtle);
    }

    .job-summary {
      display: block;
      list-style: none;
      margin-bottom: 5px;
    }

    .job-summary::-webkit-details-marker {
      display: none;
    }

    .job-summary::marker {
      content: '';
    }

    .job-summary:focus-visible {
      outline: 1px dashed var(--rule);
      outline-offset: 2px;
    }

    .job-summary .job-title {
      margin-bottom: 0;
      cursor: pointer;
    }

    .job-collapsible:not([open]) .job-summary {
      margin-bottom: 0;
    }

    .job-collapsible:not([open]) .job-bullets {
      display: none;
    }

    /* ── skills ── */
    .skills-grid {
      display: flex;
      flex-direction: column;
    }

    .skill-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .skill-row:last-child {
      margin-bottom: 0px;
    }

    .skill-cat {
      width: 160px;
      flex-shrink: 0;
      margin-right: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .skill-items {
      display: flex;
      flex-wrap: wrap;
      margin: -2.5px;
    }

    .skill-chip {
      margin: 2.5px;
      font-size: 11px;
      padding: 2px 9px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 2px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── certifications ── */
    .cert-group {
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cert-group:last-child {
      margin-bottom: 0;
    }

    .cert-issuer {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 3px;
    }

    .cert-items {
      list-style: none;
    }

    .cert-items li {
      font-size: 12px;
      color: var(--ink-light);
      padding-left: 12px;
      position: relative;
      line-height: 1.6;
    }

    .cert-items li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1.2;
    }

    /* ── education ── */
    .edu-entry {
      margin-bottom: 8px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .edu-institution {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 2px;
    }

    .edu-detail {
      font-size: 12px;
      color: var(--ink-light);
    }

    /* ── loading state ── */
    #loading {
      text-align: center;
      padding: 80px;
      color: var(--ink-muted);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    /* ── print styles ── */
    @page {
      size: A4;
      margin: 14mm 12mm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      #toolbar {
        display: none !important;
      }

      body {
        background: white !important;
        margin: 0;
        padding: 0;
      }

      #page-wrap {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
      }

      #resume {
        box-shadow: none !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <span>Guillermo Salas — Resume</span>
    <div class="toolbar-right">
      <select id="theme-select" class="theme-select" onchange="applyTheme(this.value)">
        <option value="editorial">Warm Editorial</option>
        <option value="executive">Executive Slate</option>
        <option value="carbon">Carbon Edge</option>
      </select>
      <button class="btn btn-ghost" onclick="downloadJSON()">↓ JSON</button>
      <button class="btn btn-ghost" onclick="printPDF()">⎙ Print / PDF</button>
      <button class="btn btn-primary" onclick="downloadPDF()">↓ Download PDF</button>
    </div>
  </div>

  <div id="page-wrap">
    <div id="resume">
      <div id="loading">Loading resume content…</div>
    </div>
  </div>

  <script>
    // ── Theme system ──────────────────────────────────────────────────────────────

    const THEMES = {
      editorial: {
        name: 'Warm Editorial',
        attr: '',
        fonts: 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK:'#1a1a1a', INKL:'#4a4a4a', INKM:'#888888', ACC:'#8b6f47', RULE:'#c8b99a', JOBRULE:'#e8e0d0' }
      },
      executive: {
        name: 'Executive Slate',
        attr: 'executive',
        fonts: 'https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap',
        colors: { INK:'#0f1923', INKL:'#374151', INKM:'#6b7280', ACC:'#1e3a5f', RULE:'#94a3b8', JOBRULE:'#d1d9e0' }
      },
      carbon: {
        name: 'Carbon Edge',
        attr: 'carbon',
        fonts: 'https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK:'#111827', INKL:'#374151', INKM:'#6b7280', ACC:'#0d7490', RULE:'#4b5563', JOBRULE:'#d1d5db' }
      }
    };

    let currentTheme = 'editorial';

    function applyTheme(key) {
      if (!THEMES[key]) return;
      currentTheme = key;
      const t = THEMES[key];
      document.documentElement.setAttribute('data-theme', t.attr);
      document.getElementById('gfonts-link').href = t.fonts;
      localStorage.setItem('resume-theme', key);
      const sel = document.getElementById('theme-select');
      if (sel) sel.value = key;
    }

    // ── Load JSON and render ──────────────────────────────────────────────────────

    const JSON_FILE = 'resume-content.json';
    let RESUME_DATA = null;

    async function loadResume() {
      let data;
      try {
        const res = await fetch(JSON_FILE);
        if (!res.ok) throw new Error('fetch failed');
        data = await res.json();
      } catch (e) {
        // Fallback: embedded data for standalone use
        data = EMBEDDED_DATA;
      }
      RESUME_DATA = data;
      render(data);
    }

    function render(d) {
      const resume = document.getElementById('resume');
      resume.innerHTML = `
    ${renderHeader(d.meta)}
    ${renderSummary(d.summary)}
    ${renderExperience(d.experience)}
    ${renderSkills(d.skills)}
    ${renderEducation(d.education)}
    ${renderCertifications(d.certifications)}
    ${renderAIPractitioner(d.aiPractitioner)}
  `;
    }

    function renderHeader(m) {
      return `
    <div id="header">
      <div id="header-left">
        <h1>${m.name}</h1>
        <div class="title-tag">${m.title}</div>
      </div>
      <div id="header-right">
        <div>${m.email}</div>
        <div>${m.phone}</div>
        <div>${m.location}</div>
        <div><a href="${m.linkedinUrl}" target="_blank">${m.linkedin}</a></div>
      </div>
    </div>
  `;
    }

    function renderSummary(text) {
      return `
    <div class="section">
      <div class="section-label">
        <h2>Profile</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <p class="summary-text">${text}</p>
      </div>
    </div>
  `;
    }

    function renderExperience(jobs) {
      const lastHsaIndex = jobs.reduce((lastIndex, job, index) =>
        job.company.toLowerCase().includes('hsa bank') ? index : lastIndex, -1
      );

      const jobsHTML = jobs.map((j, index) => {
        const jobHeader = `
      <div class="job-header">
        <div class="job-company">${j.company}</div>
        <div class="job-period">${j.period}</div>
      </div>
    `;

        const jobTitle = `<div class="job-title">${j.title}</div>`;

        const bulletList = `
      <ul class="job-bullets">
        ${j.bullets.map(b => b.startsWith('##')
          ? `<li class="bullet-heading">${b.slice(2).trim()}</li>`
          : `<li>${b}</li>`
        ).join('')}
      </ul>
    `;

        if (lastHsaIndex !== -1 && index > lastHsaIndex) {
          return `
    <details class="job job-collapsible">
      <summary class="job-summary">
        ${jobHeader}
        ${jobTitle}
      </summary>
      ${bulletList}
    </details>
  `;
        }

        return `
    <div class="job">
      ${jobHeader}
      ${jobTitle}
      ${bulletList}
    </div>
  `;
      }).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Experience</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${jobsHTML}
      </div>
    </div>
  `;
    }

    function renderSkills(skills) {
      const rows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-cat">${s.category}</div>
      <div class="skill-items">
        ${s.items.map(i => `<span class="skill-chip">${i}</span>`).join('')}
      </div>
    </div>
  `).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Skills</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <div class="skills-grid">${rows}</div>
      </div>
    </div>
  `;
    }

    function renderCertifications(certs) {
      const groups = certs.map(c => `
    <div class="cert-group">
      <div class="cert-issuer">${c.issuer}</div>
      <ul class="cert-items">
        ${c.items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Certifications</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${groups}
      </div>
    </div>
  `;
    }

    function renderAIPractitioner(section) {
      if (!section) return '';
      const bullets = section.bullets.map(b => {
        const colon = b.indexOf(':');
        if (colon > 0 && colon < 35) {
          return `<li><strong>${b.slice(0, colon + 1)}</strong>${b.slice(colon + 1)}</li>`;
        }
        return `<li>${b}</li>`;
      }).join('');
      return `
    <div class="section">
      <div class="section-label">
        <h2>AI Practice</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${section.intro ? `<p class="practitioner-intro">${section.intro}</p>` : ''}
        <ul class="job-bullets">${bullets}</ul>
      </div>
    </div>
  `;
    }

    function renderEducation(education) {
      if (!education || !education.length) return '';
      const entries = education.map(e => `
    <div class="edu-entry">
      <div class="edu-institution">${e.institution}</div>
      <div class="edu-detail">${e.degree} &mdash; ${e.location}, ${e.year}</div>
    </div>
  `).join('');
      return `
    <div class="section">
      <div class="section-label">
        <h2>Education</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${entries}
      </div>
    </div>
  `;
    }

    // ── PDF export ────────────────────────────────────────────────────────────────

    function downloadPDF() {
      if (!RESUME_DATA) return;
      const d = RESUME_DATA;
      const btn = document.querySelector('#toolbar .btn-primary');
      if (btn) { btn.disabled = true; btn.innerHTML = 'Generating…'; }

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });

        // ── Layout constants ────────────────────────────────────────────────────
        const PW = 595.28, PH = 841.89;
        const ML = 36, MR = 36, MT = 40, MB = 36;
        const LBL_W = 90, GAP = 14;
        const BODY_X = ML + LBL_W + GAP;           // x where body content starts
        const BODY_W = PW - MR - BODY_X;            // width of body content area
        const CAT_COL = 130;                         // skills category label width

        // ── Color helpers ───────────────────────────────────────────────────────
        const h2r = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
        const tc = h => doc.setTextColor(...h2r(h));
        const dc = h => doc.setDrawColor(...h2r(h));
        const { INK, INKL, INKM, ACC, RULE, JOBRULE } = THEMES[currentTheme].colors;

        let y = MT;

        // Add new page and reset y
        const newPage = () => { doc.addPage(); y = MT; };
        // Ensure `needed` pts are available; if not, new page
        const need = (h) => { if (y + h > PH - MB) newPage(); };

        // Draw section label at current y — does NOT advance y
        // Label text is right-aligned in the label column; body content drawn alongside
        const lbl = (text) => {
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7); tc(ACC);
          doc.text(text.toUpperCase(), ML + LBL_W, y + 7, { align: 'right' });
          dc(RULE); doc.setLineWidth(0.4);
          doc.line(ML + LBL_W - 22, y + 10, ML + LBL_W, y + 10);
        };

        // ── HEADER ─────────────────────────────────────────────────────────────
        doc.setFont('times', 'bold'); doc.setFontSize(30); tc(INK);
        doc.text(d.meta.name, ML, y + 28);

        doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(ACC);
        doc.text(d.meta.title, ML, y + 42);

        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);

          doc.text(v, PW - MR, y + 10 + i * 12.5, { align: 'right' });
        });
        y += 54;
        dc(RULE); doc.setLineWidth(1.5); doc.line(ML, y, PW - MR, y);
        y += 18;

        // ── PROFILE ────────────────────────────────────────────────────────────
        lbl('Profile');

        y += 14;

        // ── EXPERIENCE ─────────────────────────────────────────────────────────
        need(60); lbl('Experience');
        d.experience.forEach((job, idx) => {

            need(50);
            dc(JOBRULE); doc.setLineDashPattern([1.5, 1.5], 0); doc.setLineWidth(0.4);

            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);

        // ── EDUCATION ──────────────────────────────────────────────────────────

            });
            y += 6;
          }
          ai.bullets.forEach(b => {
            const colon = b.indexOf(':');
            const hasLabel = colon > 0 && colon < 35;
            const label = hasLabel ? b.slice(0, colon + 1) : '';
            const rest  = hasLabel ? b.slice(colon + 1).trim() : b;
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
            const lines = doc.splitTextToSize((hasLabel ? rest : b), BODY_W - 14);
            need(lines.length * 13 + 3);
            tc(RULE); doc.text('—', BODY_X, y + 9);
            if (hasLabel) {
              doc.setFont('helvetica', 'bold'); tc(INK);
              doc.text(label, BODY_X + 14, y + 9);
              const lw = doc.getTextWidth(label) + 3;
              doc.setFont('helvetica', 'normal'); tc(INKL);
              const firstLineRest = doc.splitTextToSize(rest, BODY_W - 14 - lw);
              doc.text(firstLineRest[0], BODY_X + 14 + lw, y + 9);
              if (firstLineRest.length > 1) {

              y += firstLineRest.length * 13 + 3;
            } else {
              lines.forEach((l, li) => { doc.text(l, BODY_X + 14, y + 9 + li * 13); });
              y += lines.length * 13 + 3;
            }
          });
        }

        doc.save('Guillermo_Salas_Resume.pdf');

      } catch (err) {
