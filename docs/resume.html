<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillermo Salas — Resume</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-muted: #888;
      --rule: #c8b99a;
      --accent: #8b6f47;
      --accent-light: #f5f0e8;
      --bg: #fdfaf5;
      --page: #ffffff;
      --col-left: clamp(96px, 16%, 132px);
      --gap: 16px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── toolbar ── */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
      gap: 12px;
    }

    #toolbar span {
      color: #aaa;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }

    #toolbar .toolbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #7a5f3a;
    }

    .btn-ghost {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
    }

    .btn-ghost:hover {
      border-color: #888;
      color: #fff;
    }

    /* ── page wrapper ── */
    #page-wrap {
      padding-top: 72px;
      padding-bottom: 48px;
      display: flex;
      justify-content: center;
    }

    /* ── resume sheet ── */
    #resume {
      background: var(--page);
      width: 794px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.10);
      padding: 44px 48px 52px;
    }

    /* ── header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 26px;
    }

    #header-left h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    #header-left .title-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
    }

    #header-right {
      text-align: right;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.9;
    }

    #header-right a {
      color: var(--accent);
      text-decoration: none;
    }

    #header-right a:hover {
      text-decoration: underline;
    }

    /* ── section layout ── */
    .section {
      display: flex;
      margin-bottom: 20px;
    }

    .section-label {
      width: var(--col-left);
      flex-shrink: 0;
      padding-top: 2px;
      text-align: right;
    }

    .section-label h2 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      padding-top: 4px;
    }

    .section-divider {
      width: 32px;
      height: 1px;
      background: var(--rule);
      margin: 8px 0 0 auto;
    }

    .section-body {
      flex-grow: 1;
      border-left: 1px solid var(--rule);
      padding-left: var(--gap);
      margin-left: var(--gap);
    }

    /* ── summary ── */
    .summary-text {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.55;
      font-style: italic;
    }

    /* ── experience ── */
    .job {
      margin-bottom: 14px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .job:last-child {
      margin-bottom: 0;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }

    .job-company {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .job-period {
      font-size: 10.5px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .job-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .job-bullets {
      list-style: none;
      padding: 0;
    }

    .job-bullets li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 2px;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.5;
    }

    .job-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--rule);
      font-size: 11px;
      top: 1px;
    }

    .job+.job {
      padding-top: 12px;
      border-top: 1px dashed #e8e0d0;
    }

    .job-summary {
      display: block;
      list-style: none;
      margin-bottom: 5px;
    }

    .job-summary::-webkit-details-marker {
      display: none;
    }

    .job-summary::marker {
      content: '';
    }

    .job-summary:focus-visible {
      outline: 1px dashed var(--rule);
      outline-offset: 2px;
    }

    .job-summary .job-title {
      margin-bottom: 0;
      cursor: pointer;
    }

    .job-collapsible:not([open]) .job-summary {
      margin-bottom: 0;
    }

    .job-collapsible:not([open]) .job-bullets {
      display: none;
    }

    /* ── skills ── */
    .skills-grid {
      display: flex;
      flex-direction: column;
    }

    .skill-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .skill-row:last-child {
      margin-bottom: 0px;
    }

    .skill-cat {
      width: 160px;
      flex-shrink: 0;
      margin-right: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .skill-items {
      display: flex;
      flex-wrap: wrap;
      margin: -2.5px;
    }

    .skill-chip {
      margin: 2.5px;
      font-size: 11px;
      padding: 2px 9px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 2px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── certifications ── */
    .cert-group {
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cert-group:last-child {
      margin-bottom: 0;
    }

    .cert-issuer {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 3px;
    }

    .cert-items {
      list-style: none;
    }

    .cert-items li {
      font-size: 12px;
      color: var(--ink-light);
      padding-left: 12px;
      position: relative;
      line-height: 1.6;
    }

    .cert-items li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1.2;
    }

    /* ── loading state ── */
    #loading {
      text-align: center;
      padding: 80px;
      color: var(--ink-muted);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    #pdf-stage {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    #pdf-stage #resume-pdf {
      background: var(--page);
      width: 794px;
      box-shadow: none;
      padding: 44px 48px 52px;
      margin: 0;
    }

    /* ── print styles ── */
    @page {
      size: A4;
      margin: 14mm 12mm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      #toolbar {
        display: none !important;
      }

      body {
        background: white !important;
        margin: 0;
        padding: 0;
      }

      #page-wrap {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
      }

      #resume {
        box-shadow: none !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <span>Guillermo Salas — Resume</span>
    <div class="toolbar-right">
      <button class="btn btn-ghost" onclick="openJSON()">✎ Edit Content</button>
      <button class="btn btn-ghost" onclick="printPDF()">⎙ Print / PDF</button>
      <button class="btn btn-primary" onclick="downloadPDF()">↓ Download PDF</button>
    </div>
  </div>

  <div id="page-wrap">
    <div id="resume">
      <div id="loading">Loading resume content…</div>
    </div>
  </div>

  <script>
    // ── Load JSON and render ──────────────────────────────────────────────────────

    const JSON_FILE = 'resume-content.json';

    async function loadResume() {
      let data;
      try {
        const res = await fetch(JSON_FILE);
        if (!res.ok) throw new Error('fetch failed');
        data = await res.json();
      } catch (e) {
        // Fallback: embedded data for standalone use
        data = EMBEDDED_DATA;
      }
      render(data);
    }

    function render(d) {
      const resume = document.getElementById('resume');
      resume.innerHTML = `
    ${renderHeader(d.meta)}
    ${renderSummary(d.summary)}
    ${renderExperience(d.experience)}
    ${renderSkills(d.skills)}
    ${renderCertifications(d.certifications)}
  `;
    }

    function renderHeader(m) {
      return `
    <div id="header">
      <div id="header-left">
        <h1>${m.name}</h1>
        <div class="title-tag">${m.title}</div>
      </div>
      <div id="header-right">
        <div>${m.email}</div>
        <div>${m.phone}</div>
        <div>${m.location}</div>
        <div><a href="${m.linkedinUrl}" target="_blank">${m.linkedin}</a></div>
      </div>
    </div>
  `;
    }

    function renderSummary(text) {
      return `
    <div class="section">
      <div class="section-label">
        <h2>Profile</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <p class="summary-text">${text}</p>
      </div>
    </div>
  `;
    }

    function renderExperience(jobs) {
      const lastHsaIndex = jobs.reduce((lastIndex, job, index) =>
        job.company.toLowerCase().includes('hsa bank') ? index : lastIndex, -1
      );

      const jobsHTML = jobs.map((j, index) => {
        const jobHeader = `
      <div class="job-header">
        <div class="job-company">${j.company}</div>
        <div class="job-period">${j.period}</div>
      </div>
    `;

        const jobTitle = `<div class="job-title">${j.title}</div>`;

        const bulletList = `
      <ul class="job-bullets">
        ${j.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    `;

        if (lastHsaIndex !== -1 && index > lastHsaIndex) {
          return `
    <details class="job job-collapsible">
      <summary class="job-summary">
        ${jobHeader}
        ${jobTitle}
      </summary>
      ${bulletList}
    </details>
  `;
        }

        return `
    <div class="job">
      ${jobHeader}
      ${jobTitle}
      ${bulletList}
    </div>
  `;
      }).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Experience</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${jobsHTML}
      </div>
    </div>
  `;
    }

    function renderSkills(skills) {
      const rows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-cat">${s.category}</div>
      <div class="skill-items">
        ${s.items.map(i => `<span class="skill-chip">${i}</span>`).join('')}
      </div>
    </div>
  `).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Skills</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <div class="skills-grid">${rows}</div>
      </div>
    </div>
  `;
    }

    function renderCertifications(certs) {
      const groups = certs.map(c => `
    <div class="cert-group">
      <div class="cert-issuer">${c.issuer}</div>
      <ul class="cert-items">
        ${c.items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `).join('');

      return `
    <div class="section">
      <div class="section-label">
        <h2>Certifications</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${groups}
      </div>
    </div>
  `;
    }

    // ── PDF export ────────────────────────────────────────────────────────────────

    function syncCollapsibleExperienceState() {
      document.querySelectorAll('#resume details.job-collapsible').forEach(node => {
        if (node.open) {
          node.setAttribute('open', '');
        } else {
          node.removeAttribute('open');
        }
      });
    }

    function createPDFStage() {
      syncCollapsibleExperienceState();
      const source = document.getElementById('resume');
      const stage = document.createElement('div');
      stage.id = 'pdf-stage';

      const exportNode = source.cloneNode(true);
      exportNode.id = 'resume-pdf';
      stage.appendChild(exportNode);
      document.body.appendChild(stage);

      return { stage, exportNode };
    }

    async function downloadPDF() {
      const toolbar = document.getElementById('toolbar');
      const button = toolbar.querySelector('.btn-primary');
      const originalLabel = button ? button.textContent : '';
      const { stage, exportNode } = createPDFStage();

      const options = {
        margin: [14, 12, 14, 12],
        filename: 'Guillermo_Salas_Resume.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false,
          scrollX: 0,
          scrollY: 0,
          width: 794,
          windowWidth: 794
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: {
          mode: ['css', 'legacy'],
          avoid: ['.job', '.skill-row', '.cert-group']
        }
      };

      try {
        toolbar.style.visibility = 'hidden';
        if (button) {
          button.disabled = true;
          button.textContent = 'Generating...';
        }

        if (document.fonts?.ready) {
          await document.fonts.ready;
        }

        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        await html2pdf().from(exportNode).set(options).save();
      } catch (error) {
        console.error('PDF export failed:', error);
        alert('PDF export failed. Please try again.');
      } finally {
        toolbar.style.visibility = 'visible';
        if (button) {
          button.disabled = false;
          button.textContent = originalLabel;
        }
        stage.remove();
      }
    }

    function printPDF() {
      syncCollapsibleExperienceState();
      window.print();
    }

        '3. Save the file\n' +
        '4. Reload this page — changes appear automatically\n\n' +
        'Keep both files (resume.html + resume-content.json) in the same folder.'
      );
    }
