<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guillermo Salas — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-light: #4a4a4a;
    --ink-muted: #888;
    --rule: #c8b99a;
    --accent: #8b6f47;
    --accent-light: #f5f0e8;
    --bg: #fdfaf5;
    --page: #ffffff;
    --col-left: 220px;
    --gap: 32px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── toolbar ── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 100;
    gap: 12px;
  }

  #toolbar span {
    color: #aaa;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
  }

  #toolbar .toolbar-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #7a5f3a; }

  .btn-ghost {
    background: transparent;
    color: #aaa;
    border: 1px solid #444;
  }
  .btn-ghost:hover { border-color: #888; color: #fff; }

  /* ── page wrapper ── */
  #page-wrap {
    padding-top: 72px;
    padding-bottom: 48px;
    display: flex;
    justify-content: center;
  }

  /* ── resume sheet ── */
  #resume {
    background: var(--page);
    width: 860px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.10);
    padding: 56px 56px 64px;
  }

  /* ── header ── */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--rule);
    margin-bottom: 36px;
  }

  #header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 6px;
  }

  #header-left .title-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
  }

  #header-right {
    text-align: right;
    font-size: 11.5px;
    color: var(--ink-light);
    line-height: 1.9;
  }

  #header-right a {
    color: var(--accent);
    text-decoration: none;
  }
  #header-right a:hover { text-decoration: underline; }

  /* ── section layout ── */
  .section {
    display: grid;
    grid-template-columns: var(--col-left) 1fr;
    gap: 0 var(--gap);
    margin-bottom: 28px;
  }

  .section-label {
    padding-top: 2px;
    text-align: right;
  }

  .section-label h2 {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    padding-top: 4px;
  }

  .section-divider {
    width: 32px;
    height: 1px;
    background: var(--rule);
    margin: 8px 0 0 auto;
  }

  .section-body {
    border-left: 1px solid var(--rule);
    padding-left: var(--gap);
  }

  /* ── summary ── */
  .summary-text {
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.75;
    font-style: italic;
  }

  /* ── experience ── */
  .job {
    margin-bottom: 22px;
  }
  .job:last-child { margin-bottom: 0; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }

  .job-company {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  .job-period {
    font-size: 10.5px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .job-title {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .job-bullets {
    list-style: none;
    padding: 0;
  }

  .job-bullets li {
    position: relative;
    padding-left: 14px;
    margin-bottom: 4px;
    font-size: 12.5px;
    color: var(--ink-light);
    line-height: 1.65;
  }

  .job-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--rule);
    font-size: 11px;
    top: 1px;
  }

  .job + .job {
    padding-top: 18px;
    border-top: 1px dashed #e8e0d0;
  }

  /* ── skills ── */
  .skills-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .skill-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 12px;
    align-items: baseline;
  }

  .skill-cat {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .skill-items {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .skill-chip {
    font-size: 11px;
    padding: 2px 9px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 2px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── certifications ── */
  .cert-group {
    margin-bottom: 10px;
  }
  .cert-group:last-child { margin-bottom: 0; }

  .cert-issuer {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 3px;
  }

  .cert-items {
    list-style: none;
  }

  .cert-items li {
    font-size: 12px;
    color: var(--ink-light);
    padding-left: 12px;
    position: relative;
    line-height: 1.6;
  }

  .cert-items li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 16px;
    line-height: 1.2;
  }

  /* ── loading state ── */
  #loading {
    text-align: center;
    padding: 80px;
    color: var(--ink-muted);
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  /* ── print styles ── */
  @media print {
    #toolbar { display: none !important; }
    #page-wrap { padding-top: 0; }
    #resume { box-shadow: none; }
    body { background: white; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <span>Guillermo Salas — Resume</span>
  <div class="toolbar-right">
    <button class="btn btn-ghost" onclick="openJSON()">✎ Edit Content</button>
    <button class="btn btn-primary" onclick="downloadPDF()">↓ Download PDF</button>
  </div>
</div>

<div id="page-wrap">
  <div id="resume">
    <div id="loading">Loading resume content…</div>
  </div>
</div>

<script>
// ── Load JSON and render ──────────────────────────────────────────────────────

const JSON_FILE = 'resume-content.json';

async function loadResume() {
  let data;
  try {
    const res = await fetch(JSON_FILE);
    if (!res.ok) throw new Error('fetch failed');
    data = await res.json();
  } catch(e) {
    // Fallback: embedded data for standalone use
    data = EMBEDDED_DATA;
  }
  render(data);
}

function render(d) {
  const resume = document.getElementById('resume');
  resume.innerHTML = `
    ${renderHeader(d.meta)}
    ${renderSummary(d.summary)}
    ${renderExperience(d.experience)}
    ${renderSkills(d.skills)}
    ${renderCertifications(d.certifications)}
  `;
}

function renderHeader(m) {
  return `
    <div id="header">
      <div id="header-left">
        <h1>${m.name}</h1>
        <div class="title-tag">${m.title}</div>
      </div>
      <div id="header-right">
        <div>${m.email}</div>
        <div>${m.phone}</div>
        <div>${m.location}</div>
        <div><a href="${m.linkedinUrl}" target="_blank">${m.linkedin}</a></div>
      </div>
    </div>
  `;
}

function renderSummary(text) {
  return `
    <div class="section">
      <div class="section-label">
        <h2>Profile</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <p class="summary-text">${text}</p>
      </div>
    </div>
  `;
}

function renderExperience(jobs) {
  const jobsHTML = jobs.map(j => `
    <div class="job">
      <div class="job-header">
        <div class="job-company">${j.company}</div>
        <div class="job-period">${j.period}</div>
      </div>
      <div class="job-title">${j.title}</div>
      <ul class="job-bullets">
        ${j.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>
  `).join('');

  return `
    <div class="section">
      <div class="section-label">
        <h2>Experience</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${jobsHTML}
      </div>
    </div>
  `;
}

function renderSkills(skills) {
  const rows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-cat">${s.category}</div>
      <div class="skill-items">
        ${s.items.map(i => `<span class="skill-chip">${i}</span>`).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="section">
      <div class="section-label">
        <h2>Skills</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <div class="skills-grid">${rows}</div>
      </div>
    </div>
  `;
}

function renderCertifications(certs) {
  const groups = certs.map(c => `
    <div class="cert-group">
      <div class="cert-issuer">${c.issuer}</div>
      <ul class="cert-items">
        ${c.items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `).join('');

  return `
    <div class="section">
      <div class="section-label">
        <h2>Certifications</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${groups}
      </div>
    </div>
  `;
}

// ── PDF export ────────────────────────────────────────────────────────────────

function downloadPDF() {
  const toolbar = document.getElementById('toolbar');
  toolbar.style.display = 'none';

  const element = document.getElementById('resume');
  const opt = {
    margin:       [10, 10, 10, 10],
    filename:     'Guillermo_Salas_Resume.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    toolbar.style.display = 'flex';
  });
}

// ── Edit JSON hint ────────────────────────────────────────────────────────────

function openJSON() {
  alert(
    'To edit resume content:\n\n' +
    '1. Open resume-content.json in any text editor\n' +
    '2. Edit your details (name, jobs, skills, certs)\n' +
    '3. Save the file\n' +
    '4. Reload this page — changes appear automatically\n\n' +
    'Keep both files (resume.html + resume-content.json) in the same folder.'
  );
}

loadResume();
</script>
