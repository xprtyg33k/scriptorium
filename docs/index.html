<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1b2a; color: #e0e1dd; }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; }
        .accordion-content.collapsed { max-height: 0; }
        .accordion-content.expanded { max-height: 1000px; }
        .chevron { transition: transform 0.3s; }
        .chevron.rotated { transform: rotate(180deg); }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto p-4 md:p-8">
        <div class="flex items-center gap-6 bg-[#1b263b] rounded-xl shadow-2xl p-6 mb-8 border-t-4 border-[#fca311]">
            <img id="profile-pic" src="https://github.com/xprtyg33k.png" alt="Profile Picture" class="w-20 h-20 rounded-full border-2 border-[#415a77]">
            <div>
                <h1 id="profile-account" class="text-lg font-semibold text-[#fca311]">@xprtyg33k</h1>
                <div id="profile-name" class="text-2xl font-bold text-white">Loading...</div>
                <div id="profile-realname" class="text-base text-[#778da9] mt-1">&nbsp;</div>
            </div>
        </div>

        <div class="bg-[#1b263b] rounded-xl shadow-2xl p-6 border-t-4 border-[#fca311]">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-white m-0 text-3xl">Scriptorium Pages</h2>
                <button id="refresh-btn" class="bg-gradient-to-r from-[#3a5a97] to-[#6c63ff] text-white rounded-lg px-4 py-2 font-semibold shadow hover:from-[#6c63ff] hover:to-[#3a5a97] transition-all duration-200 flex items-center gap-2" title="Refresh List">
                    <span id="refresh-icon" class="inline-block transition-transform duration-400">&#x21bb;</span> Refresh
                </button>
            </div>

            <div id="sections-container" class="space-y-4">
                <!-- Sections will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const githubUsername = 'xprtyg33k';
        const cacheKey = 'docsHtmlFilesCache';
        const cacheTimeKey = 'docsHtmlFilesCacheTime';
        const cacheDuration = 24 * 60 * 60 * 1000; // 24 hours

        const experityFiles = [
            'Security-Design-IP-Protection.html',
            'advr.html',
            'AIDevelopmentFramework.html',
            'AIDevelopmentFrameworkSlides.html',
            'BMAD-infographic.html'
        ];

        // --- PROFILE NAME FETCH ---
        async function fetchGithubProfile(username) {
            try {
                const res = await fetch(`https://api.github.com/users/${username}`);
                if (!res.ok) return { account: username, name: username, realname: '' };
                const data = await res.json();
                return {
                    account: username,
                    name: data.login || username,
                    realname: data.name || ''
                };
            } catch {
                return { account: username, name: username, realname: '' };
            }
        }

        // --- HTML FILES FETCH ---
        async function fetchHtmlFiles() {
            // Try cache
            const cached = localStorage.getItem(cacheKey);
            const cachedTime = localStorage.getItem(cacheTimeKey);
            const now = Date.now();
            const hardReload = window.performance && performance.navigation && performance.navigation.type === 1;
            if (cached && cachedTime && !hardReload && (now - cachedTime < cacheDuration)) {
                try {
                    return JSON.parse(cached);
                } catch {}
            }
            // Fetch manifest.json
            try {
                const res = await fetch('manifest.json');
                if (res.ok) {
                    const files = await res.json();
                    localStorage.setItem(cacheKey, JSON.stringify(files));
                    localStorage.setItem(cacheTimeKey, now);
                    return files;
                }
            } catch {}
            // Fallback
            return [
                'Security-Design-IP-Protection.html',
                'AIDevelopmentFrameworkSlides.html',
                'AIDevelopmentFramework.html',
                'advr.html',
                'BMAD-infographic.html',
                'resume.html',
                'paletteConverter.html'
            ];
        }

        function createLink(file) {
            const li = document.createElement('li');
            li.className = "mb-3";
            const a = document.createElement('a');
            a.href = file;
            let title = file.replace('.html', '').replace(/_/g, ' ');
            // Custom titles if needed
            if (file === 'AIDevelopmentFramework.html') title = 'AI Development Framework';
            if (file === 'AIDevelopmentFrameworkSlides.html') title = 'AI Framework Presentation';
            if (file === 'Security-Design-IP-Protection.html') title = 'Security Design & IP Protection';
            if (file === 'advr.html') title = 'A-D-V-R Cycle';
            if (file === 'BMAD-infographic.html') title = 'BMAD Infographic';
            if (file === 'paletteConverter.html') title = 'Palette Converter';
            if (file === 'resume.html') title = 'Resume / CV';

            a.textContent = title;
            a.target = "_blank";
            a.className = "block bg-[#0d1b2a] border-l-4 border-[#fca311] rounded-lg px-4 py-3 text-lg text-[#e0e1dd] font-semibold shadow hover:bg-[#415a77] hover:text-[#fca311] transition-all duration-200";
            li.appendChild(a);
            return li;
        }

        function createAccordion(id, title, files, isExpanded = false) {
            const container = document.createElement('div');
            container.className = "border border-[#415a77] rounded-xl overflow-hidden shadow-inner";

            const header = document.createElement('button');
            header.className = "w-full flex items-center justify-between p-4 bg-[#1b263b] text-white font-bold text-xl hover:bg-[#2c3e50] transition-colors duration-200";
            header.innerHTML = `<span>${title}</span> <span class="chevron ${isExpanded ? 'rotated' : ''}">▼</span>`;
            
            const content = document.createElement('div');
            content.className = `accordion-content ${isExpanded ? 'expanded' : 'collapsed'} bg-[#1b263b]`;
            
            const innerWrapper = document.createElement('div');
            innerWrapper.className = "p-4";

            const ul = document.createElement('ul');
            ul.className = "list-none p-0";
            
            files.forEach(file => {
                ul.appendChild(createLink(file));
            });
            
            innerWrapper.appendChild(ul);
            content.appendChild(innerWrapper);
            container.appendChild(header);
            container.appendChild(content);

            header.addEventListener('click', () => {
                const chevron = header.querySelector('.chevron');
                if (content.classList.contains('collapsed')) {
                    content.classList.remove('collapsed');
                    content.classList.add('expanded');
                    chevron.classList.add('rotated');
                } else {
                    content.classList.remove('expanded');
                    content.classList.add('collapsed');
                    chevron.classList.remove('rotated');
                }
            });

            return container;
        }

        // --- RENDER ---
        async function render(forceRefresh = false) {
            // Profile info
            const profile = await fetchGithubProfile(githubUsername);
            document.getElementById('profile-account').textContent = '@' + profile.account;
            document.getElementById('profile-name').textContent = profile.name;
            document.getElementById('profile-realname').textContent = profile.realname ? profile.realname : '';
            
            // HTML files
            if (forceRefresh) {
                localStorage.removeItem(cacheKey);
                localStorage.removeItem(cacheTimeKey);
            }
            const htmlFiles = await fetchHtmlFiles();
            
            const sectionsContainer = document.getElementById('sections-container');
            sectionsContainer.innerHTML = '';

            // Group files
            const experityList = experityFiles.filter(f => htmlFiles.includes(f));
            const personalList = htmlFiles.filter(f => !experityFiles.includes(f));

            // Render Experity Section
            if (experityList.length > 0) {
                sectionsContainer.appendChild(createAccordion('experity', 'Experity Content', experityList, true));
            }

            // Render Personal Section
            if (personalList.length > 0) {
                sectionsContainer.appendChild(createAccordion('personal', 'Personal Content', personalList, false));
            }
        }

        // Button event
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            if (btn) {
                btn.addEventListener('click', async function() {
                    icon.style.transform = 'rotate(360deg)';
                    await render(true);
                    setTimeout(() => { icon.style.transform = 'rotate(0deg)'; }, 400);
                });
            }
            render();
        });
    </script>
</body>
</html>
