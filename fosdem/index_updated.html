<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSDEM 2026 Schedule Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .header-subtitle {
            color: #666;
            font-size: 14px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .panel h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .search-box {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .filter-label:hover {
            background: #f5f5f5;
        }

        .filter-label input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .talks-section, .schedule-section {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .talks-section h2, .schedule-section h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #333;
        }

        .talk-card {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }

        .talk-card:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
            background: white;
        }

        .talk-card.in-schedule {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .talk-card.conflict {
            background: #ffebee;
            border-color: #f44336;
        }

        .talk-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #333;
        }

        .talk-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .talk-track {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .talk-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 6px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-add {
            background: #4caf50;
            color: white;
        }

        .btn-add:hover {
            background: #45a049;
        }

        .btn-remove {
            background: #f44336;
            color: white;
        }

        .btn-remove:hover {
            background: #da190b;
        }

        .btn-rate {
            background: #ff9800;
            color: white;
        }

        .btn-rate:hover {
            background: #e68900;
        }

        .rating {
            display: flex;
            gap: 2px;
            margin-top: 4px;
        }

        .star {
            width: 16px;
            height: 16px;
            cursor: pointer;
            font-size: 14px;
            line-height: 16px;
            transition: all 0.1s;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .star.filled {
            color: #ffc107;
        }

        .star.empty {
            color: #ddd;
        }

        .schedule-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
        }

        .timeline-slot {
            border-left: 3px solid #667eea;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            font-size: 12px;
        }

        .timeline-slot.conflict {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .timeline-time {
            font-weight: 600;
            color: #667eea;
            font-size: 11px;
        }

        .timeline-title {
            margin: 4px 0;
            font-weight: 500;
            color: #333;
        }

        .timeline-location {
            font-size: 11px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .stat-item {
            background: #f0f0f0;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .talk-detail {
            margin-bottom: 15px;
        }

        .detail-label {
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .detail-value {
            color: #333;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .recommendations {
            background: #f9f9f9;
            border-left: 3px solid #ff9800;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
        }

        .recommendations h4 {
            font-size: 13px;
            margin-bottom: 8px;
            color: #ff9800;
        }

        .recommendations p {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 60px 40px;
            color: #999;
            background: white;
            border-radius: 8px;
            margin: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .loading-text {
            font-size: 16px;
            margin-bottom: 20px;
            min-height: 24px;
            color: #333;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-dots {
            font-size: 14px;
            color: #999;
            margin-top: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .export-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .filter-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .badge {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-close {
            cursor: pointer;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .badge-close:hover {
            opacity: 1;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #333;
        }

        .conflicts-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #856404;
        }

        .location-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .priority-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 4px;
        }

        .priority-must {
            background: #ff6b6b;
            color: white;
        }

        .priority-interested {
            background: #4ecdc4;
            color: white;
        }

        .priority-maybe {
            background: #95e1d3;
            color: white;
        }

        .time-warning {
            background: #ffe0b2;
            border-radius: 4px;
            padding: 8px;
            margin: 8px 0;
            font-size: 12px;
            color: #e65100;
            display: none;
        }

        .time-warning.show {
            display: block;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .panel {
                flex: 1;
                min-width: 250px;
            }
        }

        @media print {
            body {
                background: white;
            }

            .sidebar, .actions-bar, .btn, .modal {
                display: none;
            }

            .schedule-timeline {
                max-height: none;
            }
        }

        .recommendation-item {
            background: white;
            border-left: 3px solid #ff9800;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .recommendation-item .talk-title {
            font-size: 13px;
        }

        .recommendation-reason {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-style: italic;
        }

        .status-message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .status-success {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-error {
            background: #ffcdd2;
            color: #c62828;
        }

        .status-info {
            background: #bbdefb;
            color: #1565c0;
        }

        .day-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .day-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .day-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .day-btn:hover {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎪 FOSDEM 2026 Schedule Planner</h1>
            <p class="header-subtitle">Brussels, Belgium • January 31 - February 1, 2026</p>
        </header>

        <div class="main-layout">
            <div class="sidebar">
                <div class="panel">
                    <h3>🔍 Search</h3>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-box" 
                        placeholder="Title, speaker, keyword..."
                    >
                </div>

                <div class="panel">
                    <h3>📍 Tracks</h3>
                    <div id="trackFilters"></div>
                </div>

                <div class="panel">
                    <h3>🏢 Building</h3>
                    <div id="buildingFilters"></div>
                </div>

                <div class="panel">
                    <h3>📅 Day</h3>
                    <div class="day-selector">
                        <button class="day-btn active" data-day="all">All Days</button>
                        <button class="day-btn" data-day="1">Day 1</button>
                        <button class="day-btn" data-day="2">Day 2</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>⚙️ Actions</h3>
                    <div class="export-options">
                        <button class="btn btn-secondary" id="exportBtn" style="flex: 1;">📥 Export</button>
                        <button class="btn btn-secondary" id="clearBtn" style="flex: 1;">🗑️ Clear</button>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="talks-section">
                    <h2>💬 Talks</h2>
                    <div class="stats" id="stats">
                        <div class="stat-item">Total: <span id="totalTalks">0</span></div>
                        <div class="stat-item">Filtered: <span id="filteredTalks">0</span></div>
                        <div class="stat-item">Rated: <span id="ratedTalks">0</span></div>
                    </div>
                    <div class="filter-badges" id="activeFilters"></div>
                    <div id="talksList" class="talks-list"></div>
                </div>

                <div class="schedule-section">
                    <h2>📋 My Schedule</h2>
                    <div class="actions-bar">
                        <button class="btn btn-primary" id="generateBtn">🤖 Generate Schedule</button>
                        <button class="btn btn-secondary" id="printBtn">🖨️ Print</button>
                    </div>
                    <div id="conflictsInfo" class="conflicts-info" style="display: none;">
                        ⚠️ You have <span id="conflictCount">0</span> time conflicts
                    </div>
                    <div id="scheduleTimeline" class="schedule-timeline"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="detailContent"></div>
        </div>
    </div>

        function parseEmbeddedSchedule() {
            try {
                if (!EMBEDDED_SCHEDULE || !EMBEDDED_SCHEDULE.talks) {
                    throw new Error('Schedule data not found');
                }

                const talks = EMBEDDED_SCHEDULE.talks.map(talk => ({
                    id: talk.id || `talk-${Math.random()}`,
                    title: talk.title || '',
                    track: talk.track || 'Other',
                    speakers: talk.speakers || 'TBD',
                    abstract: talk.abstract || '',

                    date: talk.date || '2026-01-31',

                    url: talk.url || '',
                    rating: 0,
                    priority: 'none'
                }));

                console.log(`Successfully parsed ${talks.length} talks from embedded data`);
                return talks;

                console.error('Error parsing embedded schedule:', error);

        function parseXML(xmlDoc) {
            const talks = [];
            const events = xmlDoc.getElementsByTagName('event');

            for (let event of events) {
                const title = event.getElementsByTagName('title')[0]?.textContent || '';
                const track = event.getElementsByTagName('track')[0]?.textContent || 'Other';
                const day = event.getAttribute('day') || '1';
                const date = event.getAttribute('date') || '2026-01-31';
                
                const startTime = event.getElementsByTagName('start')[0]?.textContent || '09:00';
                const duration = event.getElementsByTagName('duration')[0]?.textContent || '00:45';
                const room = event.getElementsByTagName('room')[0]?.textContent || 'TBD';
                
                const speakers = [];
                const personElements = event.getElementsByTagName('person');
                for (let person of personElements) {
                    speakers.push(person.textContent);
                }

                const abstract = event.getElementsByTagName('abstract')[0]?.textContent || '';
                const url = event.getElementsByTagName('url')[0]?.textContent || '';

                const endTime = addMinutes(startTime, parseDuration(duration));

                talks.push({
                    id: event.getAttribute('id') || Math.random().toString(),
                    title: title.trim(),
                    track: track.trim(),
                    speakers: speakers.join(', ') || 'TBD',
                    abstract: abstract.trim(),
                    day: parseInt(day),
                    date: date,
                    startTime: startTime,
                    endTime: endTime,
                    duration: duration,
                    room: room.trim(),
                    building: extractBuilding(room),
                    url: url.trim(),
                    rating: 0,
                    priority: 'none'
                });
            }

            state.talks = talks;
            console.log(`Loaded ${talks.length} talks`);
        }

        function generateSampleTalks() {
            const tracks = ['AI & ML', 'Rust', 'Performance', 'DevOps', 'Go', 'Database', 'Kernel'];
            const buildings = ['AW', 'H', 'J', 'K', 'U', 'UA'];
            const talks = [];

            const sampleTitles = [
                'LLMs in Production: Optimization Strategies',
                'Rust Systems Programming Deep Dive',
                'Performance Profiling with Modern Tools',
                'CI/CD Pipelines at Scale',
                'Go Concurrency Patterns',
                'Database Query Optimization',
                'Linux Kernel Security Features',
                'Kubernetes Best Practices',
                'Agent Architectures for Autonomous Systems',
                'Memory Safety in Systems Programming'
            ];

            const speakers = ['Alice Johnson', 'Bob Smith', 'Carol Chen', 'David Lee', 'Eve Martinez'];

            for (let i = 0; i < 50; i++) {
                const day = Math.random() > 0.5 ? 1 : 2;
                const hour = 9 + Math.floor(Math.random() * 8);
                const minute = Math.random() > 0.5 ? 0 : 30;
                const startTime = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                
                talks.push({
                    id: `talk-${i}`,
                    title: sampleTitles[i % sampleTitles.length] + ` #${i}`,
                    track: tracks[i % tracks.length],
                    speakers: speakers[Math.floor(Math.random() * speakers.length)],
                    abstract: 'An in-depth exploration of modern software engineering practices.',
                    day: day,
                    date: day === 1 ? '2026-01-31' : '2026-02-01',
                    startTime: startTime,
                    endTime: addMinutes(startTime, 45),
                    duration: '00:45',
                    room: `Room ${String.fromCharCode(65 + Math.floor(Math.random() * 5))}`,
                    building: buildings[Math.floor(Math.random() * buildings.length)],
                    url: '#',
                    rating: 0,
                    priority: 'none'
                });
            }

            return talks;
        }

        function extractBuilding(room) {
            const match = room.match(/^([A-Z]+)/);
            return match ? match[1] : 'Unknown';
        }

        function parseDuration(durationStr) {
            const parts = durationStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function addMinutes(time, minutes) {
            const [hours, mins] = time.split(':').map(Number);
            const totalMins = hours * 60 + mins + minutes;
            const newHours = Math.floor(totalMins / 60) % 24;
            const newMins = totalMins % 60;
            return `${String(newHours).padStart(2, '0')}:${String(newMins).padStart(2, '0')}`;
        }

        function loadFromLocalStorage() {
            const data = JSON.parse(localStorage.getItem('fosdemSchedule') || '{}');
            if (data.schedule) {
                state.schedule = state.talks.filter(t => data.schedule.includes(t.id));
            }
            if (data.ratings) {
                state.ratings = data.ratings;
                state.talks.forEach(talk => {
                    if (state.ratings[talk.id]) {
                        talk.rating = state.ratings[talk.id].rating;
                        talk.priority = state.ratings[talk.id].priority;
                    }
                });
            }
        }

        function getFilteredTalks() {
            return state.talks.filter(talk => {
                if (state.filters.search) {
                    const search = state.filters.search.toLowerCase();
                    const matchesSearch = 
                        talk.title.toLowerCase().includes(search) ||
                        talk.speakers.toLowerCase().includes(search) ||
                        talk.track.toLowerCase().includes(search) ||
                        talk.abstract.toLowerCase().includes(search);
                    if (!matchesSearch) return false;
                }

                if (state.filters.tracks.length > 0) {
                    if (!state.filters.tracks.some(t => talk.track.includes(t) || t.includes(talk.track))) {
                        return false;
                    }
                }

                if (state.filters.buildings.length > 0) {
                    if (!state.filters.buildings.includes(talk.building)) {
                        return false;
                    }
                }

                if (state.filters.day !== 'all') {
                    if (talk.day !== parseInt(state.filters.day)) return false;
                }

                return true;
            });
        }

                        ${talk.room} ${building}
                    </div>
                    <button class="btn-small btn-remove" style="margin-top: 6px;" onclick="removeTalk('${talk.id}')">Remove</button>
                `;

                container.appendChild(slot);
            });

            updateConflictInfo();
        }

        function renderActiveFilters() {
            const container = document.getElementById('activeFilters');
            const filters = [];

            if (state.filters.search) filters.push(state.filters.search);
            filters.push(...state.filters.tracks);
            filters.push(...state.filters.buildings);
            if (state.filters.day !== 'all') filters.push(`Day ${state.filters.day}`);

            container.innerHTML = filters.map(f => `
                <div class="badge">
                    ${f}
                    <span class="badge-close" onclick="clearFilter('${f}')">×</span>
                </div>
            `).join('');
        }

        function clearFilter(filter) {
            if (state.filters.search === filter) {
                state.filters.search = '';
                document.getElementById('searchInput').value = '';
            }
            state.filters.tracks = state.filters.tracks.filter(t => t !== filter);
            state.filters.buildings = state.filters.buildings.filter(b => b !== filter);
            state.filters.day = filter.startsWith('Day') ? 'all' : state.filters.day;

            renderTalks();
            updateStats();
            renderActiveFilters();
            renderTracks();
            renderBuildings();
        }

        function updateStats() {
            const filtered = getFilteredTalks();
            const rated = state.talks.filter(t => t.rating > 0).length;

            document.getElementById('totalTalks').textContent = state.talks.length;
            document.getElementById('filteredTalks').textContent = filtered.length;
            document.getElementById('ratedTalks').textContent = rated;
        }

        // ============================================================================
        // SCHEDULE MANAGEMENT
        // ============================================================================
        function addTalk(talkId) {
            const talk = state.talks.find(t => t.id === talkId);
            if (talk && !state.schedule.some(t => t.id === talkId)) {
                state.schedule.push(talk);
                saveToLocalStorage();
                renderTalks();
                renderSchedule();
                showStatus(`Added: ${talk.title}`, 'success');
            }
        }

        function removeTalk(talkId) {
            state.schedule = state.schedule.filter(t => t.id !== talkId);
            saveToLocalStorage();
            renderTalks();
            renderSchedule();
        }

        function rateTalk(talkId, rating) {
            const talk = state.talks.find(t => t.id === talkId);
            if (talk) {
                talk.rating = rating;
                state.ratings[talkId] = {rating, priority: talk.priority};
                saveToLocalStorage();
                renderTalks();
                renderSchedule();
            }
        }

        function showRatingMenu(event, talkId) {
            event.stopPropagation();
            const menu = document.createElement('div');
            menu.style.cssText = `
                position: fixed;
                background: white;
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 8px;
                z-index: 100;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            `;

            menu.innerHTML = Array.from({length: 5}, (_, i) => 
                `<button style="display: block; width: 100%; padding: 6px; text-align: left; border: none; cursor: pointer;" 
                    onclick="rateTalk('${talkId}', ${i+1}); this.parentElement.remove();">
                    ${'★'.repeat(i+1)}${'☆'.repeat(5-i-1)}
                </button>`
            ).join('');

            document.body.appendChild(menu);

            const rect = event.target.getBoundingClientRect();
            menu.style.left = rect.left + 'px';
            menu.style.top = (rect.bottom + 5) + 'px';

            document.addEventListener('click', function removeMenu() {
                menu.remove();
                document.removeEventListener('click', removeMenu);
            });
        }

        function hasTimeConflict(talk) {
            return state.schedule.some(t => {
                if (t.id === talk.id || t.date !== talk.date) return false;
                
                const tStart = timeToMinutes(t.startTime);
                const tEnd = timeToMinutes(t.endTime);
                const oStart = timeToMinutes(talk.startTime);
                const oEnd = timeToMinutes(talk.endTime);

                return !(oEnd <= tStart || oStart >= tEnd);
            });
        }

        function timeToMinutes(time) {
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        }

        function updateConflictInfo() {
            const conflicts = state.schedule.filter(hasTimeConflict);
            const infoDiv = document.getElementById('conflictsInfo');
            
            if (conflicts.length > 0) {
                document.getElementById('conflictCount').textContent = conflicts.length;
                infoDiv.style.display = 'block';
            } else {
                infoDiv.style.display = 'none';
            }
        }

        // ============================================================================
        // SMART FEATURES
        // ============================================================================
        function generateSchedule() {
            const recommended = getRecommendedTalks();
            state.schedule = [];

            // Add highest-rated talks first
            const sorted = recommended
                .sort((a, b) => {
                    if (b.rating !== a.rating) return b.rating - a.rating;
                    const aKeyword = checkKeywordMatch(a);
                    const bKeyword = checkKeywordMatch(b);
                    return bKeyword - aKeyword;
                });

            for (const talk of sorted) {
                if (!hasTimeConflict(talk)) {
                    state.schedule.push(talk);
                }
            }

            saveToLocalStorage();
            renderSchedule();
            renderTalks();
            showStatus(`Generated schedule with ${state.schedule.length} talks`, 'success');
        }

        function getRecommendedTalks() {
            const ratedTalks = state.talks.filter(t => t.rating > 0);
            
            if (ratedTalks.length === 0) {
                return getKeywordTalks();
            }

            const ratedTracks = new Set(ratedTalks.map(t => t.track));
            const recommendations = [];

            state.talks.forEach(talk => {
                if (talk.rating > 0) {
                    recommendations.push({...talk, score: talk.rating});
                } else if (ratedTracks.has(talk.track)) {
                    recommendations.push({...talk, score: 3});
                } else {
                    const keywordScore = checkKeywordMatch(talk);
                    if (keywordScore > 0) {
                        recommendations.push({...talk, score: keywordScore});
                    }
                }
            });

            return recommendations.sort((a, b) => b.score - a.score).slice(0, 25);
        }

        function getKeywordTalks() {
            const keywordMatches = state.talks.map(talk => ({
                ...talk,
                score: checkKeywordMatch(talk)
            })).filter(t => t.score > 0);

            return keywordMatches.sort((a, b) => b.score - a.score).slice(0, 15);
        }

        function checkKeywordMatch(talk) {
            let score = 0;
            const text = (talk.title + ' ' + talk.abstract).toLowerCase();

            const mustSeeMatch = PRIORITY_KEYWORDS.mustSee.some(k => text.includes(k));
            const interestedMatch = PRIORITY_KEYWORDS.interested.filter(k => text.includes(k)).length;
            const maybeMatch = PRIORITY_KEYWORDS.maybe.filter(k => text.includes(k)).length;

            score += mustSeeMatch ? 5 : 0;
            score += interestedMatch * 2;
            score += maybeMatch;

            return score;
        }

        // ============================================================================
        // EXPORT & IMPORT
        // ============================================================================
        function exportSchedule() {
            if (state.schedule.length === 0) {
                showStatus('No talks in schedule to export', 'info');
                return;
            }

            const sorted = [...state.schedule].sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                return a.startTime.localeCompare(b.startTime);
            });

            let text = 'FOSDEM 2026 Schedule\n';
            text += '=====================\n\n';

            let lastDate = '';
            sorted.forEach(talk => {
                if (talk.date !== lastDate) {
                    text += '\n' + new Date(talk.date).toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric'}) + '\n';
                    text += '-'.repeat(40) + '\n';
                    lastDate = talk.date;
                }

                text += `\n${talk.startTime} - ${talk.endTime}\n`;
                text += `${talk.title}\n`;
                text += `Track: ${talk.track}\n`;
                text += `Speakers: ${talk.speakers}\n`;
                text += `Location: ${talk.building} - ${talk.room}\n`;
            });

            downloadFile(text, 'fosdem-schedule.txt');
            showStatus('Schedule exported successfully', 'success');
        }

        function exportJSON() {
            const data = {
                exported: new Date().toISOString(),
                conference: 'FOSDEM 2026',
                talks: state.schedule.map(t => ({
                    title: t.title,
                    track: t.track,
                    speakers: t.speakers,
                    date: t.date,
                    startTime: t.startTime,
                    endTime: t.endTime,
                    location: `${t.building} - ${t.room}`,
                    rating: t.rating
                }))
            };

            downloadFile(JSON.stringify(data, null, 2), 'fosdem-schedule.json');
            showStatus('JSON exported successfully', 'success');
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ============================================================================
        // UI UTILITIES
        // ============================================================================
        function showStatus(message, type = 'info', persistent = false) {
            const div = document.createElement('div');
            div.className = `status-message status-${type}`;
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.alignItems = 'center';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = message;
            div.appendChild(textSpan);
            
            // Add close button for persistent messages
            if (persistent) {
                const closeBtn = document.createElement('button');
                closeBtn.textContent = '×';
                closeBtn.style.cssText = 'background:none; border:none; font-size:20px; cursor:pointer; opacity:0.7; margin-left:10px;';
                closeBtn.onclick = () => div.remove();
                div.appendChild(closeBtn);
            }
            
            document.querySelector('header').appendChild(div);
            
            // Only auto-remove non-error, non-persistent messages
            if (!persistent && type !== 'error') {
                setTimeout(() => div.remove(), 4000);
            }
        }

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.filters.search = e.target.value;
            renderTalks();
            updateStats();
            renderActiveFilters();
        });

        document.getElementById('generateBtn').addEventListener('click', generateSchedule);
        document.getElementById('printBtn').addEventListener('click', () => window.print());
        
        document.getElementById('exportBtn').addEventListener('click', () => {
            const menu = document.createElement('div');
            menu.style.cssText = `
                position: absolute;
                background: white;
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 8px;
                z-index: 100;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            `;
            menu.innerHTML = `
                <button style="display: block; width: 100%; padding: 8px; text-align: left; border: none; cursor: pointer; border-radius: 4px;" 
                    onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background=''" 
                    onclick="exportSchedule(); this.parentElement.remove();">
                    📄 Export as Text
                </button>
                <button style="display: block; width: 100%; padding: 8px; text-align: left; border: none; cursor: pointer; border-radius: 4px;" 
                    onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background=''" 
                    onclick="exportJSON(); this.parentElement.remove();">
                    📋 Export as JSON
                </button>
            `;
            document.body.appendChild(menu);
            const rect = document.getElementById('exportBtn').getBoundingClientRect();
            menu.style.left = (rect.left - 150) + 'px';
            menu.style.top = (rect.bottom + 5) + 'px';

            document.addEventListener('click', function removeMenu() {
                if (!menu.contains(event.target) && event.target.id !== 'exportBtn') {
                    menu.remove();
                    document.removeEventListener('click', removeMenu);
                }
            });
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear all talks from your schedule?')) {
                state.schedule = [];
                saveToLocalStorage();
                renderSchedule();
                renderTalks();
                showStatus('Schedule cleared', 'info');
            }
        });

        // Day filter buttons
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.filters.day = e.target.dataset.day;
                renderTalks();
                updateStats();
                renderActiveFilters();
            });
        });

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        window.addEventListener('load', () => {
            document.getElementById('talksList').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading schedule...</div>
                    <div class="loading-dots">⋅ ⋅ ⋅</div>
                </div>
            `;
            // Use setTimeout to ensure UI renders before heavy loading
            setTimeout(loadSchedule, 100);
        });

        // Expose functions to window
        window.addTalk = addTalk;
        window.removeTalk = removeTalk;
        window.rateTalk = rateTalk;
        window.showTalkDetails = showTalkDetails;
        window.closeModal = closeModal;
        window.showRatingMenu = showRatingMenu;
        window.exportSchedule = exportSchedule;
        window.exportJSON = exportJSON;
        window.generateSchedule = generateSchedule;
        window.clearFilter = clearFilter;
    </script>
</body>
</html>
